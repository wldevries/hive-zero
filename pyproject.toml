[project]
name = "hive-zero"
version = "0.1.0"
description = "Hive AI engine with AlphaZero-style MCTS"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.4.3",
    "pytest>=9.0.2",
    "colorama>=0.4.6",
]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.uv]
# Rebuild Rust extension when source changes
cache-keys = [{ file = "pyproject.toml" }, { file = "rust/Cargo.toml" }, { file = "rust/crates/*/Cargo.toml" }, { file = "rust/crates/*/src/**/*.rs" }]

[tool.maturin]
manifest-path = "rust/crates/engine-zero/Cargo.toml"
module-name = "hive_engine"
