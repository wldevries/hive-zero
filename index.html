<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zertz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; gap: 24px; }
h1 { font-size: 1.4rem; color: #a0c8ff; margin-bottom: 12px; }
h2 { font-size: 0.85rem; color: #8899bb; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

#board-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0; }
svg { display: block; }

.hex { cursor: default; transition: opacity 0.1s; }
.hex.clickable { cursor: pointer; }
.hex.clickable:hover { opacity: 0.85; }

#sidebar { width: 240px; display: flex; flex-direction: column; gap: 16px; padding-top: 4px; }

@media (max-width: 720px) {
  body { flex-direction: column; align-items: center; padding: 12px; gap: 16px; }
  #board-wrap { width: 100%; }
  #board-wrap svg { width: 100%; height: auto; max-width: 440px; }
  #sidebar { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 0; }
  #panel-turn   { grid-column: 1 / -1; }
  #panel-log    { grid-column: 1 / -1; }
  #panel-ai     { grid-column: 1 / -1; }
  #panel-syslog { grid-column: 1 / -1; }
  #play-log-wrap { max-height: 200px; }
}

.panel { background: #16213e; border: 1px solid #2a3a5e; border-radius: 8px; padding: 12px; }

.status-row { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dot.p1 { background: #7bbfff; }
.dot.p2 { background: #ff9966; }
#status-text { color: #c0d8ff; font-weight: 600; }
#phase-text { color: #8899bb; font-size: 0.8rem; margin-top: 4px; }

#turn-indicator {
  padding: 5px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: 700;
  text-align: center; margin-top: 8px;
}
#turn-indicator.your-turn  { background: #0e2a0e; color: #66dd66; border: 1px solid #2a5a2a; }
#turn-indicator.ai-turn    { background: #2a2a0a; color: #ddbb44; border: 1px solid #555520; }
#turn-indicator.game-over  { background: #1a1a2a; color: #888899; border: 1px solid #333344; display: none; }

.capture-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 0.85rem; }
.capture-table thead th { text-align: center; font-size: 1.1rem; padding-bottom: 4px; color: #c0d8ff; font-weight: normal; }
.capture-table tbody th { text-align: left; padding: 3px 6px 3px 0; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
.capture-table tbody td { text-align: center; padding: 3px 4px; color: #c0d8ff; font-size: 0.9rem; font-weight: 600; }
.capture-table .row-supply { color: #8899bb; }
.capture-table .row-p1 { color: #7bbfff; }
.capture-table .row-p2 { color: #ff9966; }

/* Marble color picker */
#color-picker { display: flex; gap: 12px; justify-content: center; align-items: center; padding: 8px 0; }
#color-picker.hidden { display: none; }
.color-btn {
  width: 44px; height: 44px; border-radius: 50%; border: 3px solid transparent;
  cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; color: #333;
}
.color-btn:hover { transform: scale(1.1); }
.color-btn.selected { border-color: #ffd700; transform: scale(1.12); }
.color-btn.disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
#btn-white { background: #f0f0f0; color: #555; }
#btn-grey  { background: #999; color: #eee; }
#btn-black { background: #222; color: #ddd; border-color: #555; }
#btn-black.selected { border-color: #ffd700; }

#ai-btn {
  width: 100%; padding: 10px; background: #1a4080; border: 1px solid #3060a0;
  border-radius: 6px; color: #a0c8ff; font-size: 0.9rem; cursor: pointer;
  font-weight: 600; transition: background 0.15s;
}
#ai-btn:hover:not(:disabled) { background: #2a5090; }
#ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#ai-btn.nn-mode { background: #1a5030; border-color: #306050; color: #80d8b0; }
#ai-btn.nn-mode:hover:not(:disabled) { background: #2a6040; }
#cancel-btn {
  width: 100%; padding: 8px; background: #402010; border: 1px solid #603020;
  border-radius: 6px; color: #ff9966; font-size: 0.85rem; cursor: pointer;
  font-weight: 600; transition: background 0.15s; display: none;
}
#cancel-btn:hover { background: #503020; }

.settings-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #8899bb; margin-top: 6px; }
.settings-row input[type=number] { width: 60px; background: #0d1b30; border: 1px solid #2a3a5e; color: #c0d8ff; border-radius: 4px; padding: 2px 4px; font-size: 0.8rem; }

/* Model status */
#model-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; margin-top: 6px; }
.model-badge {
  font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: 600;
}
.model-badge.loading { background: #2a3a1a; color: #88aa60; }
.model-badge.ready    { background: #1a3a2a; color: #60d090; }
.model-badge.failed   { background: #3a1a1a; color: #d06060; }
.model-badge.none     { background: #2a2a3a; color: #8899bb; }

#value-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #8899bb; margin-top: 6px; display: none; }
#value-bar-wrap { flex: 1; margin-left: 8px; height: 6px; background: #0d1b30; border-radius: 3px; overflow: hidden; }
#value-bar { height: 100%; width: 50%; background: #60d090; border-radius: 3px; transition: width 0.3s, background 0.3s; }

/* Play log */
#play-log-wrap { font-size: 0.75rem; font-family: monospace; max-height: 160px; overflow-y: auto; }
#play-log-wrap table { width: 100%; border-collapse: collapse; }
#play-log-wrap td { padding: 2px 4px; vertical-align: top; white-space: nowrap; }
#play-log-wrap td.turn-num { color: #445566; min-width: 22px; }
#play-log-wrap td.p1-cell { color: #7bbfff; min-width: 28px; }
#play-log-wrap td.p2-cell { color: #ff9966; min-width: 28px; }
#play-log-wrap td.move-cell { color: #c0d8ff; }
#play-log-wrap tr { cursor: pointer; }
#play-log-wrap tr:hover { background: #1a2a3a; }
#play-log-wrap tr.log-selected { background: #1a3a5a !important; outline: 1px solid #3060a0; }

#return-btn {
  width: 100%; padding: 7px; background: #1a3a20; border: 1px solid #2a5030;
  border-radius: 6px; color: #80d8b0; font-size: 0.8rem; cursor: pointer;
  font-weight: 600; transition: background 0.15s; display: none; margin-top: 6px;
}
#return-btn:hover { background: #2a4a30; }
#play-log-wrap .log-header { color: #445566; border-bottom: 1px solid #2a3a5e; margin-bottom: 2px; display: flex; gap: 4px; padding: 0 4px 4px; font-size: 0.7rem; }

/* System log */
#log { font-size: 0.75rem; color: #667799; max-height: 80px; overflow-y: auto; }

#outcome-banner { display: none; padding: 10px; border-radius: 6px; text-align: center; font-weight: 700; font-size: 1rem; margin-top: 8px; }

/* Start screen */
#start-screen {
  position: fixed; inset: 0;
  background: rgba(8, 10, 20, 0.95);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
#start-card {
  background: #16213e; border: 1px solid #2a3a5e; border-radius: 12px;
  padding: 32px 40px; text-align: center; min-width: 280px;
}
#start-card .title { font-size: 1.6rem; color: #a0c8ff; margin-bottom: 6px; font-weight: 700; }
#start-card .subtitle { color: #667799; font-size: 0.85rem; margin-bottom: 28px; }
.start-btn {
  display: block; width: 100%; padding: 13px 16px; margin-bottom: 10px;
  border-radius: 8px; border: 2px solid transparent; font-size: 0.95rem;
  font-weight: 700; cursor: pointer; transition: all 0.15s; text-align: left;
}
.start-btn:last-child { margin-bottom: 0; }
.start-btn .btn-label { font-size: 1rem; }
.start-btn .btn-sub { font-size: 0.78rem; font-weight: 400; opacity: 0.75; display: block; margin-top: 2px; }
.start-btn.p1 { background: #0e2040; border-color: #2a4a7a; color: #7bbfff; }
.start-btn.p1:hover { background: #1a3060; border-color: #7bbfff; }
.start-btn.p2 { background: #2a1408; border-color: #5a2c10; color: #ff9966; }
.start-btn.p2:hover { background: #3a2010; border-color: #ff9966; }

/* Sims config in start card */
.start-sims-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.82rem; color: #8899bb; margin-top: 20px; padding-top: 16px; border-top: 1px solid #2a3a5e; }
.start-sims-row input[type=number] { width: 70px; background: #0d1b30; border: 1px solid #2a3a5e; color: #c0d8ff; border-radius: 4px; padding: 3px 6px; font-size: 0.82rem; text-align: right; }
</style>
</head>
<body>

<!-- Start screen -->
<div id="start-screen">
  <div id="start-card">
    <div class="title">Zertz</div>
    <div class="subtitle">Choose your side</div>
    <button class="start-btn p1" id="choose-p1">
      <span class="btn-label">Play as Player 1</span>
      <span class="btn-sub">You go first &middot; blue</span>
    </button>
    <button class="start-btn p2" id="choose-p2">
      <span class="btn-label">Play as Player 2</span>
      <span class="btn-sub">AI goes first &middot; orange</span>
    </button>
    <div class="start-sims-row">
      <label for="start-sims-input">AI simulations</label>
      <input type="number" id="start-sims-input" value="1200" min="50" max="2000" step="50">
    </div>
  </div>
</div>

<div id="board-wrap">
  <h1>Zertz</h1>
  <svg id="board-svg" viewBox="-220 -220 440 440" width="440" height="440"></svg>
  <div id="color-picker" class="hidden">
    <button class="color-btn" id="btn-white" title="White">W</button>
    <button class="color-btn" id="btn-grey"  title="Grey">G</button>
    <button class="color-btn" id="btn-black" title="Black">B</button>
  </div>
</div>

<div id="sidebar">
  <div class="panel" id="panel-turn">
    <h2>Turn</h2>
    <div class="status-row">
      <span class="dot" id="player-dot"></span>
      <span id="status-text">—</span>
    </div>
    <div id="phase-text"></div>
    <div id="turn-indicator" class="your-turn"></div>
    <div id="outcome-banner"></div>
  </div>

  <div class="panel" id="panel-marbles">
    <h2>Marbles</h2>
    <table class="capture-table">
      <thead>
        <tr>
          <th></th>
          <th>⚪</th>
          <th>🔘</th>
          <th>⚫</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th class="row-supply">Supply</th>
          <td id="sup-w">—</td>
          <td id="sup-g">—</td>
          <td id="sup-b">—</td>
        </tr>
        <tr>
          <th class="row-p1">P1</th>
          <td id="cap-p1w">—</td>
          <td id="cap-p1g">—</td>
          <td id="cap-p1b">—</td>
        </tr>
        <tr>
          <th class="row-p2">P2</th>
          <td id="cap-p2w">—</td>
          <td id="cap-p2g">—</td>
          <td id="cap-p2b">—</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="panel" id="panel-log">
    <h2>Play Log</h2>
    <div id="play-log-wrap">
      <div class="log-header">
        <span style="min-width:22px">#</span>
        <span style="min-width:28px">Plr</span>
        <span>Move</span>
      </div>
      <table id="play-log-table"></table>
    </div>
    <button id="return-btn">&#8617; Return to current</button>
  </div>

  <div class="panel" id="panel-ai">
    <h2>AI</h2>

    <!-- Model status -->
    <div id="model-row">
      <span style="color:#8899bb">Model</span>
      <span class="model-badge none" id="model-badge">not loaded</span>
    </div>

    <!-- Value bar (shown after NN eval) -->
    <div id="value-row" style="margin-top:6px">
      <span>Eval</span>
      <div id="value-bar-wrap"><div id="value-bar"></div></div>
      <span id="value-label" style="margin-left:6px;color:#c0d8ff;min-width:40px;text-align:right">—</span>
    </div>

    <div class="settings-row">
      <label>Simulations</label>
      <input type="number" id="sims-input" value="1200" min="50" max="2000" step="50">
    </div>
    <div class="settings-row" id="rollouts-row">
      <label>Rollouts/leaf</label>
      <input type="number" id="rollouts-input" value="1" min="1" max="10">
    </div>

    <button id="ai-btn" style="margin-top:10px">AI Move</button>
    <button id="cancel-btn" style="margin-top:6px">Cancel</button>
  </div>

  <div class="panel" id="panel-syslog">
    <h2>Log</h2>
    <div id="log"></div>
  </div>
</div>

<!-- ORT Web — includes WebGPU EP; falls back to WASM CPU automatically -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.webgpu.min.js"></script>

<script type="module">
import init, {
  ZertzGame, hex_coords, board_cell_count,
  board_flat_size, reserve_size, place_head_size, cap_head_size,
} from './pkg/zertz_wasm.js';

// ── ORT Web setup ─────────────────────────────────────────────────────────────
if (typeof ort !== 'undefined') {
  ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/';
}

let ortSession = null;
let ortEp = 'none';

// ── hex geometry ─────────────────────────────────────────────────────────────
const HEX_SIZE = 28;

function hexCenter(q, r) {
  return {
    x: HEX_SIZE * (1.5 * q),
    y: HEX_SIZE * (Math.sqrt(3) * r + Math.sqrt(3) / 2 * q),
  };
}

function hexPoints(cx, cy, size) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = Math.PI / 3 * i;
    return `${cx + size * Math.cos(a)},${cy + size * Math.sin(a)}`;
  }).join(' ');
}

const RADIUS = 3;
function coordLabel(q, r) {
  const col = String.fromCharCode('A'.charCodeAt(0) + q + RADIUS);
  const row = RADIUS + 1 - r;
  return `${col}${row}`;
}

// ── constants ─────────────────────────────────────────────────────────────────
const HIGHLIGHT = {
  cap_src:   { stroke: '#ff8800', sw: 2.5 },
  cap_dst:   { stroke: '#00ccff', sw: 2.5 },
  place:     { stroke: '#44dd44', sw: 2.5 },
  remove:    { stroke: '#ff4444', sw: 2.5 },
};

const RING_FILL    = '#d4c4a0';
const RING_STROKE  = '#8a7a60';
const REMOVED_FILL = '#2a2a3a';
const MARBLE_COLORS = {
  2: { fill: '#f0f0f0', stroke: '#aaaaaa' },
  3: { fill: '#999999', stroke: '#555555' },
  4: { fill: '#222222', stroke: '#000000' },
};

// ── state ─────────────────────────────────────────────────────────────────────
let game;
let coords = [];

let humanPlayer = null;   // 0 = P1, 1 = P2; null until chosen
let turnNumber  = 0;

let phase = 'idle';
let selectedColor = null;
let selectedCell  = null;
let capSrcLabel   = null;
let capChainPlayer = null;  // player who started the current capture chain

// ── last-move highlight state ─────────────────────────────────────────────────
let lastMoveInfo       = null;
let pendingCaptureMoves = [];

// ── play log history ──────────────────────────────────────────────────────────
let moveHistory = [];   // [{ player, displayStr, rawMoves: string[] }, ...]
let historyView = null; // null = live; or { turnIdx, cellStates, supply, caps, outcome, player, lastMoveInfo }

// ── SVG setup ─────────────────────────────────────────────────────────────────
const svgNS = 'http://www.w3.org/2000/svg';
const svg   = document.getElementById('board-svg');

function buildBoard() {
  svg.innerHTML = '';
  const n   = board_cell_count();
  const raw = hex_coords();
  coords = [];
  for (let i = 0; i < n; i++) {
    const q = raw[i * 2], r = raw[i * 2 + 1];
    coords.push({ q, r });
    const { x, y } = hexCenter(q, r);
    const g = document.createElementNS(svgNS, 'g');
    g.dataset.idx = i;

    const poly = document.createElementNS(svgNS, 'polygon');
    poly.setAttribute('points', hexPoints(x, y, HEX_SIZE - 1.5));
    poly.setAttribute('fill', RING_FILL);
    poly.setAttribute('stroke', RING_STROKE);
    poly.setAttribute('stroke-width', '1');
    poly.classList.add('hex');
    g.appendChild(poly);

    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', HEX_SIZE * 0.45);
    circle.style.display = 'none';
    circle.classList.add('marble');
    g.appendChild(circle);

    g.addEventListener('click', () => onCellClick(i));
    svg.appendChild(g);
  }
}

// ── rendering ─────────────────────────────────────────────────────────────────
function getHighlightSet() {
  const map   = new Map();
  const moves = game.valid_moves();
  if (phase === 'idle') {
    moves.filter(m => m.startsWith('CAP ')).forEach(m => {
      map.set(m.trim().split(/\s+/)[1], 'cap_src');
    });
  } else if (phase === 'pick-color') {
    const prefix = selectedColor + ' ';
    moves.filter(m => m.startsWith(prefix)).forEach(m => {
      map.set(m.trim().split(/\s+/)[1], 'place');
    });
  } else if (phase === 'pick-remove') {
    const prefix = `${selectedColor} ${selectedCell} `;
    moves.filter(m => m.startsWith(prefix)).forEach(m => {
      const parts = m.trim().split(/\s+/);
      if (parts[2]) map.set(parts[2], 'remove');
    });
  } else if (phase === 'pick-cap-dst') {
    moves.filter(m => {
      const parts = m.trim().split(/\s+/);
      return parts[0] === 'CAP' && parts[1] === capSrcLabel;
    }).forEach(m => {
      map.set(m.trim().split(/\s+/)[2], 'cap_dst');
    });
  }
  return map;
}

function isHumanTurn() {
  return humanPlayer !== null && game.next_player() === humanPlayer;
}

function updateBoard() {
  const isHistory = historyView !== null;
  const states  = isHistory ? historyView.cellStates : game.cell_states();
  const supply  = isHistory ? historyView.supply     : game.supply_counts();
  const caps    = isHistory ? historyView.caps        : game.capture_counts();
  const outcome = isHistory ? historyView.outcome     : game.outcome();
  const player  = isHistory ? historyView.player      : game.next_player();
  const moves   = isHistory ? []                       : game.valid_moves();

  // Only show interaction highlights when it's the human's turn (never in history view)
  const hlMap = (!isHistory && isHumanTurn()) ? getHighlightSet() : new Map();

  const groups = svg.querySelectorAll('g[data-idx]');
  groups.forEach(g => {
    const i     = parseInt(g.dataset.idx);
    const s     = states[i];
    const poly  = g.querySelector('polygon');
    const circle = g.querySelector('circle');
    const label = coordLabel(coords[i].q, coords[i].r);

    if (s === 0) {
      poly.setAttribute('fill', REMOVED_FILL);
      poly.setAttribute('stroke', '#333344');
      circle.style.display = 'none';
    } else {
      poly.setAttribute('fill', RING_FILL);
      if (s >= 2) {
        const mc = MARBLE_COLORS[s];
        circle.setAttribute('fill', mc.fill);
        circle.setAttribute('stroke', mc.stroke);
        circle.setAttribute('stroke-width', '1.5');
        circle.style.display = '';
      } else {
        circle.style.display = 'none';
      }
    }

    if (hlMap.has(label)) {
      const hl = HIGHLIGHT[hlMap.get(label)];
      poly.setAttribute('stroke', hl.stroke);
      poly.setAttribute('stroke-width', hl.sw);
      poly.classList.add('clickable');
    } else {
      poly.setAttribute('stroke', s === 0 ? '#333344' : RING_STROKE);
      poly.setAttribute('stroke-width', '1');
      poly.classList.remove('clickable');
    }
  });

  document.getElementById('sup-w').textContent = supply[0];
  document.getElementById('sup-g').textContent = supply[1];
  document.getElementById('sup-b').textContent = supply[2];
  document.getElementById('cap-p1w').textContent = caps[0];
  document.getElementById('cap-p1g').textContent = caps[1];
  document.getElementById('cap-p1b').textContent = caps[2];
  document.getElementById('cap-p2w').textContent = caps[3];
  document.getElementById('cap-p2g').textContent = caps[4];
  document.getElementById('cap-p2b').textContent = caps[5];

  const dot        = document.getElementById('player-dot');
  const statusText = document.getElementById('status-text');
  const phaseText  = document.getElementById('phase-text');
  const banner     = document.getElementById('outcome-banner');
  const aiBtn      = document.getElementById('ai-btn');
  const indicator  = document.getElementById('turn-indicator');

  if (isHistory) {
    dot.className = 'dot ' + (player === 0 ? 'p1' : 'p2');
    statusText.textContent = player === 0 ? 'Player 1 (blue)' : 'Player 2 (orange)';
    phaseText.textContent = `Turn ${historyView.turnIdx + 1} of ${moveHistory.length}`;
    indicator.className = 'your-turn';
    indicator.textContent = 'Viewing history';
    indicator.style.display = '';
    banner.style.display = 'none';
    aiBtn.disabled = true;
  } else if (outcome === 'ongoing') {
    dot.className = 'dot ' + (player === 0 ? 'p1' : 'p2');
    statusText.textContent = player === 0 ? 'Player 1 (blue)' : 'Player 2 (orange)';
    banner.style.display = 'none';

    if (humanPlayer !== null) {
      const myTurn = player === humanPlayer;
      aiBtn.disabled = myTurn;  // AI button only active on AI's turn
      indicator.className = 'your-turn';
      indicator.textContent = myTurn ? 'Your turn' : 'AI is thinking…';
      indicator.style.display = '';
    } else {
      aiBtn.disabled = false;
      indicator.style.display = 'none';
    }

    const phaseHints = {
      'idle':        game.is_mid_capture() ? 'Continue capture chain' : 'Place a marble or capture',
      'pick-color':  'Pick a marble color',
      'pick-cell':   'Pick cell to place marble',
      'pick-remove': 'Pick a ring to remove',
      'pick-cap-dst':'Pick capture destination',
    };
    phaseText.textContent = (isHumanTurn() || humanPlayer === null) ? (phaseHints[phase] || '') : '';
  } else {
    dot.className = 'dot';
    phaseText.textContent = '';
    indicator.style.display = 'none';
    if (outcome === 'p1') {
      banner.textContent = 'Player 1 wins!';
      banner.style.background = '#1a4060';
      statusText.textContent = 'Game over';
    } else if (outcome === 'p2') {
      banner.textContent = 'Player 2 wins!';
      banner.style.background = '#402010';
      statusText.textContent = 'Game over';
    } else {
      banner.textContent = 'Draw';
      banner.style.background = '#303020';
      statusText.textContent = 'Game over';
    }
    banner.style.display = 'block';
    aiBtn.disabled = true;
  }

  // Color picker: only show on human's turn (never in history view)
  const picker = document.getElementById('color-picker');
  const colorVisible = !isHistory && outcome === 'ongoing' && isHumanTurn()
    && (phase === 'idle' || phase === 'pick-color') && !game.is_mid_capture();
  picker.classList.toggle('hidden', !colorVisible);

  if (colorVisible) {
    ['W', 'G', 'B'].forEach((c, idx) => {
      const btn       = document.getElementById(['btn-white','btn-grey','btn-black'][idx]);
      const available = supply[idx] > 0 && moves.some(m => m.startsWith(c + ' '));
      btn.classList.toggle('disabled', !available);
      btn.classList.toggle('selected', c === selectedColor);
    });
  }

  document.getElementById('cancel-btn').style.display = (!isHistory && phase !== 'idle' && isHumanTurn()) ? 'block' : 'none';
  document.getElementById('return-btn').style.display = isHistory ? 'block' : 'none';

  // Show/hide rollouts row and update AI button style
  const nnReady = ortSession !== null;
  const aiPlayer = humanPlayer !== null ? (1 - humanPlayer) : null;
  const aiLabel = aiPlayer === 0 ? 'P1' : aiPlayer === 1 ? 'P2' : '';
  document.getElementById('rollouts-row').style.display = nnReady ? 'none' : 'flex';
  aiBtn.classList.toggle('nn-mode', nnReady);
  aiBtn.textContent = nnReady
    ? `AI Move NN${aiLabel ? ' (' + aiLabel + ')' : ''}`
    : `AI Move${aiLabel ? ' (' + aiLabel + ')' : ''}`;

  renderLastMove(isHistory ? historyView.lastMoveInfo : undefined);
}

// ── interaction ───────────────────────────────────────────────────────────────
function resetPhase() {
  phase = 'idle';
  selectedColor = null;
  selectedCell  = null;
  capSrcLabel   = null;
}

function formatCaptureChain(moves) {
  if (!moves.length) return '';
  const parts0 = moves[0].mv.trim().split(/\s+/);
  let result = `CAP ${parts0[1]}→${parts0[2]}`;
  for (let i = 1; i < moves.length; i++) {
    const parts = moves[i].mv.trim().split(/\s+/);
    result += `→${parts[2]}`;
  }
  return result;
}

function playMove(mv) {
  try {
    const playerBefore = game.next_player();
    const statesBefore = Array.from(game.cell_states());
    game.play(mv);
    if (mv.trim().startsWith('CAP')) {
      if (pendingCaptureMoves.length === 0) capChainPlayer = playerBefore;
      pendingCaptureMoves.push({ mv, statesBefore });
      if (game.is_mid_capture()) {
        resetPhase();
        handleMidCapture();
        updateBoard();
        return;
      }
      lastMoveInfo = computeLastMoveInfo(pendingCaptureMoves);
      logMove(capChainPlayer, formatCaptureChain(pendingCaptureMoves), pendingCaptureMoves.map(p => p.mv));
      pendingCaptureMoves = [];
      capChainPlayer = null;
    } else {
      pendingCaptureMoves = [];
      lastMoveInfo = computeLastMoveInfo([{ mv, statesBefore }]);
      logMove(playerBefore, mv.trim(), [mv.trim()]);
    }
    resetPhase();
    handleMidCapture();
    updateBoard();
    // After a human move, trigger AI if it's now the AI's turn
    if (humanPlayer !== null && game.next_player() !== humanPlayer && game.outcome() === 'ongoing') {
      setTimeout(triggerAiMove, 80);
    }
  } catch (e) {
    log(`Error: ${e}`);
    resetPhase();
    updateBoard();
  }
}

function onColorClick(color) {
  if (historyView !== null) return;
  if (!isHumanTurn() && humanPlayer !== null) return;
  const moves = game.valid_moves();
  if (!moves.some(m => m.startsWith(color + ' '))) return;
  selectedColor = color;
  phase = 'pick-color';
  lastMoveInfo = null;
  pendingCaptureMoves = [];
  updateBoard();
}

function onCellClick(idx) {
  if (historyView !== null) return;
  if (game.outcome() !== 'ongoing') return;
  if (!isHumanTurn() && humanPlayer !== null) return;
  const label = coordLabel(coords[idx].q, coords[idx].r);
  const moves = game.valid_moves();

  if (phase === 'pick-color') {
    const prefix   = selectedColor + ' ';
    const matching = moves.filter(m => m.startsWith(prefix) && m.trim().split(/\s+/)[1] === label);
    if (matching.length === 0) return;
    if (matching.some(m => m.trim().split(/\s+/).length === 2)) {
      playMove(`${selectedColor} ${label}`);
      return;
    }
    selectedCell = label;
    phase = 'pick-remove';
    updateBoard();
    return;
  }

  if (phase === 'pick-remove') {
    const mv = `${selectedColor} ${selectedCell} ${label}`;
    if (moves.includes(mv)) playMove(mv);
    return;
  }

  if (phase === 'pick-cap-dst') {
    const mv = `CAP ${capSrcLabel} ${label}`;
    if (moves.includes(mv)) playMove(mv);
    return;
  }

  if (phase === 'idle') {
    if (moves.some(m => m.startsWith('CAP ') && m.trim().split(/\s+/)[1] === label)) {
      capSrcLabel = label;
      phase = 'pick-cap-dst';
      lastMoveInfo = null;
      pendingCaptureMoves = [];
      updateBoard();
    }
  }
}

// ── last-move highlight helpers ───────────────────────────────────────────────
function labelToIdx(label) {
  return coords.findIndex((c) => coordLabel(c.q, c.r) === label);
}

function captureMidLabel(label1, label2) {
  const i1 = labelToIdx(label1), i2 = labelToIdx(label2);
  if (i1 < 0 || i2 < 0) return null;
  const midQ = (coords[i1].q + coords[i2].q) / 2;
  const midR = (coords[i1].r + coords[i2].r) / 2;
  return coordLabel(midQ, midR);
}

function computeLastMoveInfo(moves) {
  if (!moves.length) return null;
  const firstParts = moves[0].mv.trim().split(/\s+/);
  if (firstParts[0] === 'CAP') {
    const path = [firstParts[1]];
    const capturedBalls = [];
    for (const { mv, statesBefore } of moves) {
      const parts = mv.trim().split(/\s+/);
      path.push(parts[2]);
      const mid = captureMidLabel(parts[1], parts[2]);
      if (mid !== null) {
        const idx = labelToIdx(mid);
        if (idx >= 0 && statesBefore[idx] >= 2)
          capturedBalls.push({ label: mid, color: statesBefore[idx] });
      }
    }
    return { type: 'capture', path, capturedBalls };
  }
  return { type: 'place', placedLabel: firstParts[1], removedLabel: firstParts[2] || null };
}

function addHexRing(parent, label, stroke, sw, dasharray, opacity) {
  const idx = labelToIdx(label);
  if (idx < 0) return;
  const { x, y } = hexCenter(coords[idx].q, coords[idx].r);
  const poly = document.createElementNS(svgNS, 'polygon');
  poly.setAttribute('points', hexPoints(x, y, HEX_SIZE - 1.5));
  poly.setAttribute('fill', 'none');
  poly.setAttribute('stroke', stroke);
  poly.setAttribute('stroke-width', sw);
  if (dasharray) poly.setAttribute('stroke-dasharray', dasharray);
  poly.setAttribute('opacity', opacity);
  parent.appendChild(poly);
}

function renderLastMove(infoOverride) {
  const lmi = infoOverride !== undefined ? infoOverride : lastMoveInfo;
  const old = document.getElementById('move-overlay');
  if (old) old.remove();
  if (!lmi) return;

  const overlay = document.createElementNS(svgNS, 'g');
  overlay.id = 'move-overlay';
  overlay.style.pointerEvents = 'none';

  if (lmi.type === 'place') {
    addHexRing(overlay, lmi.placedLabel, '#aaff44', 3, null, 0.85);
    if (lmi.removedLabel)
      addHexRing(overlay, lmi.removedLabel, '#ff6644', 2.5, '7,4', 0.75);
  } else {
    const { path, capturedBalls } = lmi;
    for (const { label, color } of capturedBalls) {
      const idx = labelToIdx(label);
      if (idx < 0) continue;
      const { x, y } = hexCenter(coords[idx].q, coords[idx].r);
      const mc = MARBLE_COLORS[color];
      if (!mc) continue;
      const g = document.createElementNS(svgNS, 'circle');
      g.setAttribute('cx', x); g.setAttribute('cy', y);
      g.setAttribute('r', HEX_SIZE * 0.45);
      g.setAttribute('fill', mc.fill);
      g.setAttribute('stroke', mc.stroke);
      g.setAttribute('stroke-width', '1.5');
      g.setAttribute('opacity', '0.35');
      overlay.appendChild(g);
    }
    path.forEach((label, i) => {
      const isStart = i === 0, isEnd = i === path.length - 1;
      const stroke = isStart ? '#ff9900' : '#00ddff';
      const sw     = (isStart || isEnd) ? 3 : 2;
      const op     = (isStart || isEnd) ? 0.9 : 0.55;
      addHexRing(overlay, label, stroke, sw, null, op);
    });
  }

  svg.appendChild(overlay);
}

// ── mid-capture auto-detection ────────────────────────────────────────────────
function handleMidCapture() {
  if (!game.is_mid_capture()) return false;
  const moves = game.valid_moves();
  const srcs  = new Set(moves.map(m => m.trim().split(/\s+/)[1]));
  if (srcs.size === 1) {
    capSrcLabel = [...srcs][0];
    phase = 'pick-cap-dst';
    return true;
  }
  return false;
}

// ── color preference (post-MCTS) ──────────────────────────────────────────────
function applyColorPreference(validMoves, aiMove) {
  const parts = aiMove.trim().split(/\s+/);
  if (!['W', 'G', 'B'].includes(parts[0])) return aiMove;
  const rest = parts.slice(1).join(' ');
  for (const color of ['W', 'G', 'B']) {
    const candidate = `${color} ${rest}`;
    if (validMoves.some(m => m === candidate)) return candidate;
  }
  return aiMove;
}

// ── ORT eval function ─────────────────────────────────────────────────────────
async function ortEvalBatch(boards, reserves, n) {
  const BOARD_CHANNELS = 6, GRID = 7, RES_SIZE = 22;
  const boardData   = new Float32Array(boards);
  const reserveData = new Float32Array(reserves);
  const boardTensor   = new ort.Tensor('float32', boardData,   [n, BOARD_CHANNELS, GRID, GRID]);
  const reserveTensor = new ort.Tensor('float32', reserveData, [n, RES_SIZE]);
  const outputs = await ortSession.run({ board: boardTensor, reserve: reserveTensor });
  return [
    new Float32Array(outputs.place.data.buffer,      outputs.place.data.byteOffset,      outputs.place.data.byteLength      / 4),
    new Float32Array(outputs.cap_source.data.buffer,  outputs.cap_source.data.byteOffset,  outputs.cap_source.data.byteLength  / 4),
    new Float32Array(outputs.cap_dest.data.buffer,    outputs.cap_dest.data.byteOffset,    outputs.cap_dest.data.byteLength    / 4),
    new Float32Array(outputs.value.data.buffer,       outputs.value.data.byteOffset,       outputs.value.data.byteLength       / 4),
  ];
}

// ── model loading ─────────────────────────────────────────────────────────────
function setModelBadge(state, text) {
  const badge = document.getElementById('model-badge');
  badge.className = 'model-badge ' + state;
  badge.textContent = text;
}

async function loadModel(url) {
  if (typeof ort === 'undefined') {
    setModelBadge('failed', 'ORT unavailable');
    log('onnxruntime-web failed to load — check your internet connection.');
    return;
  }
  setModelBadge('loading', 'loading…');
  log(`Loading ONNX model from ${url}…`);
  try {
    const modelResp = await fetch(url);
    if (!modelResp.ok) throw new Error(`HTTP ${modelResp.status} fetching ${url}`);
    const modelBytes = new Uint8Array(await modelResp.arrayBuffer());
    const dataUrl  = url + '.data';
    const dataName = dataUrl.split('/').pop();
    const sessionOptions = { executionProviders: ['webgpu', 'wasm'] };
    const dataResp = await fetch(dataUrl).catch(() => null);
    if (dataResp && dataResp.ok) {
      log(`Loading weight data (${dataName})…`);
      const dataBytes = new Uint8Array(await dataResp.arrayBuffer());
      sessionOptions.externalData = [{ path: dataName, data: dataBytes }];
    }
    ortSession = await ort.InferenceSession.create(modelBytes, sessionOptions);
    const ep = (typeof navigator !== 'undefined' && 'gpu' in navigator) ? 'WebGPU' : 'CPU';
    ortEp = ep;
    setModelBadge('ready', `ready · ${ep}`);
    log(`ONNX model loaded (${ep}) — NN+MCTS active.`);
    updateBoard();
  } catch (e) {
    ortSession = null;
    const msg = (e && e.message) ? e.message : String(e);
    setModelBadge('failed', 'load failed');
    log(`Model load error: ${msg}`);
    console.error('ORT load failed:', e);
    updateBoard();
  }
}

// ── value bar ─────────────────────────────────────────────────────────────────
function showValue(v) {
  const pct = Math.round((v + 1) / 2 * 100);
  const bar   = document.getElementById('value-bar');
  const label = document.getElementById('value-label');
  const row   = document.getElementById('value-row');
  row.style.display = 'flex';
  bar.style.width   = `${pct}%`;
  bar.style.background = v > 0.1 ? '#d06060' : v < -0.1 ? '#60d090' : '#8899bb';
  label.textContent = (v >= 0 ? '+' : '') + v.toFixed(2);
}

// ── AI ────────────────────────────────────────────────────────────────────────
let aiRunning = false;

async function triggerAiMove() {
  if (aiRunning) return;
  if (historyView !== null) return;
  if (game.outcome() !== 'ongoing') return;
  if (humanPlayer !== null && game.next_player() === humanPlayer) return;

  aiRunning = true;
  const sims     = parseInt(document.getElementById('sims-input').value)    || 300;
  const rollouts = parseInt(document.getElementById('rollouts-input').value) || 1;
  const btn      = document.getElementById('ai-btn');
  btn.disabled   = true;

  const aiPlayer = humanPlayer !== null ? (1 - humanPlayer) : game.next_player();
  const aiMoves  = [];
  try {
    do {
      const t0 = performance.now();
      let mv;
      const statesBefore = Array.from(game.cell_states());

      if (ortSession !== null) {
        btn.textContent = 'Thinking (NN)…';
        const result = await game.best_move_nn(ortEvalBatch, sims, 1.5);
        mv = result.move;
        showValue(result.value);
        const ms = (performance.now() - t0).toFixed(0);
        mv = applyColorPreference(game.valid_moves(), mv);
        log(`AI (NN): ${mv}  val=${result.value.toFixed(2)}  ${sims} sims  ${ms}ms`);
      } else {
        btn.textContent = 'Thinking…';
        mv = game.best_move_random(sims, rollouts, 1.5);
        const ms = (performance.now() - t0).toFixed(0);
        mv = applyColorPreference(game.valid_moves(), mv);
        log(`AI (random): ${mv}  ${sims} sims  ${ms}ms`);
      }

      game.play(mv);
      aiMoves.push({ mv, statesBefore });
      resetPhase();
    } while (game.is_mid_capture());

    lastMoveInfo = computeLastMoveInfo(aiMoves);
    pendingCaptureMoves = [];

    const moveStr = aiMoves[0].mv.trim().startsWith('CAP')
      ? formatCaptureChain(aiMoves)
      : aiMoves[0].mv.trim();
    logMove(aiPlayer, moveStr, aiMoves.map(a => a.mv));

    updateBoard();
  } catch (e) {
    log(`AI error: ${e}`);
  } finally {
    aiRunning  = false;
    btn.disabled = false;
    updateBoard();
  }
}

document.getElementById('ai-btn').addEventListener('click', () => triggerAiMove());

document.getElementById('cancel-btn').addEventListener('click', () => {
  resetPhase();
  updateBoard();
});

document.getElementById('return-btn').addEventListener('click', () => returnToCurrent());

['W', 'G', 'B'].forEach((c, i) => {
  const ids = ['btn-white', 'btn-grey', 'btn-black'];
  document.getElementById(ids[i]).addEventListener('click', () => onColorClick(c));
});

// ── play log ──────────────────────────────────────────────────────────────────
function logMove(player, moveStr, rawMoves) {
  const turnIdx = moveHistory.length;
  moveHistory.push({ player, displayStr: moveStr, rawMoves: rawMoves || [moveStr] });

  turnNumber++;
  const table = document.getElementById('play-log-table');
  const row = table.insertRow(-1);  // append at bottom
  const cls = player === 0 ? 'p1-cell' : 'p2-cell';
  const plr = player === 0 ? 'P1' : 'P2';
  row.innerHTML = `<td class="turn-num">${turnNumber}</td><td class="${cls}">${plr}</td><td class="move-cell">${moveStr}</td>`;
  row.addEventListener('click', () => showHistoryTurn(turnIdx));
  // Auto-scroll to bottom only when not viewing history
  if (historyView === null) {
    const wrap = document.getElementById('play-log-wrap');
    wrap.scrollTop = wrap.scrollHeight;
  }
}

function showHistoryTurn(turnIdx) {
  // Replay game from scratch up to and including turnIdx
  const tempGame = new ZertzGame();

  // Play all prior turns silently
  for (let i = 0; i < turnIdx; i++) {
    for (const mv of moveHistory[i].rawMoves) tempGame.play(mv);
  }

  // Play the target turn's moves, collecting statesBefore for highlight computation
  const entry = moveHistory[turnIdx];
  const moveInfoInputs = [];
  for (const mv of entry.rawMoves) {
    const statesBefore = Array.from(tempGame.cell_states());
    moveInfoInputs.push({ mv, statesBefore });
    tempGame.play(mv);
  }

  historyView = {
    turnIdx,
    cellStates: Array.from(tempGame.cell_states()),
    supply:     Array.from(tempGame.supply_counts()),
    caps:       Array.from(tempGame.capture_counts()),
    outcome:    tempGame.outcome(),
    player:     entry.player,
    lastMoveInfo: computeLastMoveInfo(moveInfoInputs),
  };

  // Highlight selected row in log
  const rows = document.querySelectorAll('#play-log-table tr');
  rows.forEach((r, i) => r.classList.toggle('log-selected', i === turnIdx));

  updateBoard();
  // Scroll the selected row into view
  if (rows[turnIdx]) rows[turnIdx].scrollIntoView({ block: 'nearest' });
}

function returnToCurrent() {
  historyView = null;
  // Clear row selection
  document.querySelectorAll('#play-log-table tr').forEach(r => r.classList.remove('log-selected'));
  // Scroll log to bottom
  const wrap = document.getElementById('play-log-wrap');
  wrap.scrollTop = wrap.scrollHeight;
  updateBoard();
}

// ── system logging ────────────────────────────────────────────────────────────
function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML = `<div>${msg}</div>` + el.innerHTML;
}

// ── start screen ─────────────────────────────────────────────────────────────
function choosePlayer(p) {
  humanPlayer = p;
  // Sync sims from start screen input to the sidebar input
  const startSims = parseInt(document.getElementById('start-sims-input').value);
  if (!isNaN(startSims)) document.getElementById('sims-input').value = startSims;
  document.getElementById('start-screen').style.display = 'none';
  log(`Game started. You are ${p === 0 ? 'P1 (blue, goes first)' : 'P2 (orange, goes second)'}.`);
  updateBoard();
  // If AI goes first (human chose P2), trigger AI immediately
  if (p === 1) setTimeout(triggerAiMove, 200);
}

document.getElementById('choose-p1').addEventListener('click', () => choosePlayer(0));
document.getElementById('choose-p2').addEventListener('click', () => choosePlayer(1));

// ── init ──────────────────────────────────────────────────────────────────────
async function main() {
  await init();
  game = new ZertzGame();
  buildBoard();
  handleMidCapture();
  // Don't call updateBoard yet — wait for player selection
  // But do start loading the model in parallel
  loadModel('./zertz_b6_c64.onnx');
}

main().catch(console.error);
</script>
